services:
  - type: web
    name: hlidaci-pes
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/tracker.db
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
