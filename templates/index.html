<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketSwap Hlídač 🎟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2130;
    --border: #2a2f45;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --danger: #ff5959;
    --success: #47ffa0;
    --text: #e8eaf0;
    --muted: #6b7280;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }

  header {
    display: flex; align-items: center; gap: 16px;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .logo { font-size: 2.2rem; animation: bounce 1.8s ease-in-out infinite; display: inline-block; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  h1 { font-family: var(--sans); font-weight: 800; font-size: clamp(1.8rem,4vw,2.4rem); letter-spacing: -1px; line-height: 1; }
  h1 span { color: var(--accent); }
  .subtitle { font-family: var(--mono); font-size: .72rem; color: var(--muted); margin-top: 5px; }

  .status-bar { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
  .pill {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--mono); font-size: .72rem; color: var(--muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.green { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 26px; margin-bottom: 20px;
  }
  .card-label {
    font-family: var(--mono); font-size: .68rem; text-transform: uppercase;
    letter-spacing: 2px; color: var(--accent); margin-bottom: 18px;
  }

  .input-group { margin-bottom: 14px; }
  label { display: block; font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-bottom: 5px; }
  input, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: .85rem;
    padding: 11px 15px; border-radius: 10px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,.1); }
  input::placeholder { color: var(--muted); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:480px) { .two-col { grid-template-columns: 1fr; } }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px; border: none; border-radius: 10px;
    font-family: var(--mono); font-size: .8rem; font-weight: 700;
    cursor: pointer; transition: transform .15s, opacity .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--accent); color: #0d0f14; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(255,89,89,.12); color: var(--danger); border: 1px solid rgba(255,89,89,.25); }
  .btn-sm { padding: 7px 14px; font-size: .7rem; }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  /* PREVIEW BOX */
  #preview-box { display: none; margin-top: 18px; }
  .preview-inner {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
  }
  .preview-name { font-weight: 600; font-size: 1rem; margin-bottom: 10px; }
  .preview-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { font-family: var(--mono); font-size: .75rem; color: var(--muted); }
  .stat span { color: var(--accent2); font-weight: 700; }
  .listings-preview { margin-top: 12px; }
  .listing-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: .78rem;
  }
  .listing-row:last-child { border-bottom: none; }
  .l-price { color: var(--accent); font-weight: 700; }
  .l-tickets { color: var(--muted); }

  /* EVENTS LIST */
  .events-grid { display: flex; flex-direction: column; gap: 12px; }
  .event-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start;
    transition: border-color .2s;
  }
  .event-card:hover { border-color: rgba(232,255,71,.25); }
  .event-name { font-weight: 600; font-size: .95rem; margin-bottom: 5px; }
  .event-url { font-family: var(--mono); font-size: .65rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }
  .event-meta { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
  .meta-item { font-family: var(--mono); font-size: .72rem; color: var(--muted); }
  .meta-item span { color: var(--accent2); }
  .meta-item.limit span { color: var(--accent); }
  .event-actions { display: flex; gap: 8px; }

  /* NOTIF PANEL */
  .notif-panel { margin-top: 12px; display: none; }
  .notif-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--surface); border-radius: 8px;
    margin-bottom: 6px; font-family: var(--mono); font-size: .75rem;
  }
  .n-price { color: var(--success); font-weight: 700; }
  .n-date { color: var(--muted); font-size: .65rem; }
  .n-link { color: var(--accent2); text-decoration: none; }
  .n-link:hover { text-decoration: underline; }

  .alert {
    padding: 11px 16px; border-radius: 10px;
    font-family: var(--mono); font-size: .76rem;
    margin-bottom: 14px; display: none;
  }
  .alert.show { display: block; }
  .alert-success { background: rgba(71,255,160,.08); border: 1px solid rgba(71,255,160,.25); color: var(--success); }
  .alert-error { background: rgba(255,89,89,.08); border: 1px solid rgba(255,89,89,.25); color: var(--danger); }

  .spinner { width:15px; height:15px; border:2px solid rgba(255,255,255,.2); border-top-color:currentColor; border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align:center; padding:44px 20px; color:var(--muted); font-family:var(--mono); font-size:.78rem; line-height:1.9; }
  .empty-state .big { font-size:2.8rem; margin-bottom:10px; display:block; }

  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .section-label { font-family:var(--mono); font-size:.68rem; text-transform:uppercase; letter-spacing:2px; color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">🎟</div>
    <div>
      <h1>TicketSwap <span>Hlídač</span></h1>
      <div class="subtitle">// kontrola každých 5 minut — telegram notifikace</div>
    </div>
  </header>

  <div class="status-bar">
    <div class="pill"><div class="dot green"></div>Aktivní</div>
    <div class="pill" id="event-count-pill">0 sledovaných akcí</div>
    <button class="btn btn-secondary btn-sm" onclick="checkNow()" id="check-btn">↻ Zkontrolovat teď</button>
    <button class="btn btn-secondary btn-sm" onclick="testTelegram()">📬 Test Telegram</button>
  </div>

  <!-- ADD EVENT -->
  <div class="card">
    <div class="card-label">// přidat akci</div>
    <div id="alert-add" class="alert"></div>

    <div class="input-group">
      <label>URL AKCE NA TICKETSWAP</label>
      <input type="url" id="url-input" placeholder="https://www.ticketswap.com/event/..." />
    </div>

    <button class="btn btn-secondary" onclick="previewEvent()" id="preview-btn">
      <span id="preview-icon">🔍</span> Načíst info
    </button>

    <!-- Preview after fetch -->
    <div id="preview-box">
      <div class="preview-inner">
        <div class="preview-name" id="preview-name">—</div>
        <div class="preview-stats">
          <div class="stat">Dostupné lístky: <span id="preview-count">—</span></div>
          <div class="stat">Nejlevnější: <span id="preview-cheapest">—</span></div>
        </div>
        <div class="listings-preview" id="preview-listings"></div>
      </div>

      <div class="two-col" style="margin-top:16px;">
        <div class="input-group" style="margin:0">
          <label>MAX. CENA ZA LÍSTEK (nepovinné)</label>
          <input type="number" id="max-price" placeholder="např. 50" step="0.01" />
        </div>
        <div class="input-group" style="margin:0">
          <label>MĚNA</label>
          <select id="currency">
            <option value="EUR">EUR</option>
            <option value="CZK">CZK</option>
            <option value="GBP">GBP</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="addEvent()" id="add-btn">✅ Přidat hlídání</button>
        <button class="btn btn-secondary" onclick="resetForm()">Zrušit</button>
      </div>
    </div>
  </div>

  <!-- EVENTS LIST -->
  <div class="section-header">
    <div class="section-label">// sledované akce</div>
    <button class="btn btn-secondary btn-sm" onclick="loadEvents()">↻ Obnovit</button>
  </div>

  <div id="alert-main" class="alert"></div>
  <div id="events-container">
    <div class="empty-state">
      <span class="big">🎪</span>
      Zatím žádné sledované akce.<br>Vlož URL z TicketSwap výše!
    </div>
  </div>

</div>

<script>
let previewData = null;

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = `alert alert-${type} show`;
  el.textContent = msg;
  setTimeout(() => el.classList.remove('show'), 6000);
}

function formatDate(iso) {
  if (!iso) return 'nikdy';
  const d = new Date(iso);
  return d.toLocaleDateString('cs-CZ') + ' ' + d.toTimeString().slice(0,5);
}

async function previewEvent() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showAlert('alert-add', 'error', 'Zadej URL akce.'); return; }

  const btn = document.getElementById('preview-btn');
  const icon = document.getElementById('preview-icon');
  btn.disabled = true;
  icon.innerHTML = '<span class="spinner"></span>';

  try {
    const res = await fetch('/api/preview', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url})
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch(e) { throw new Error('Chyba serveru — zkontroluj logy na Render.com'); }

    if (!res.ok) throw new Error(data.error || 'Neznámá chyba');

    previewData = data;
    document.getElementById('preview-name').textContent = data.name;
    document.getElementById('preview-count').textContent = data.total_listings;

    if (data.cheapest) {
      document.getElementById('preview-cheapest').textContent =
        `${data.cheapest.price.toFixed(2)} ${data.cheapest.currency}`;
    }

    const listEl = document.getElementById('preview-listings');
    if (data.listings && data.listings.length) {
      listEl.innerHTML = data.listings.map(l => `
        <div class="listing-row">
          <span class="l-price">${l.price.toFixed(2)} ${l.currency}</span>
          <span class="l-tickets">${l.num_tickets}x lístek</span>
          <a href="${l.url}" target="_blank" style="color:var(--accent2);font-size:.7rem;text-decoration:none;">odkaz →</a>
        </div>
      `).join('');
    } else {
      listEl.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:.75rem;padding:10px 0">Momentálně žádné dostupné lístky.</div>';
    }

    document.getElementById('preview-box').style.display = 'block';

  } catch(e) {
    showAlert('alert-add', 'error', e.message);
  } finally {
    btn.disabled = false;
    icon.textContent = '🔍';
  }
}

async function addEvent() {
  if (!previewData) return;
  const url = document.getElementById('url-input').value.trim();
  const maxPrice = document.getElementById('max-price').value;
  const currency = document.getElementById('currency').value;

  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Ukládám…';

  try {
    const res = await fetch('/api/events', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        url, name: previewData.name,
        max_price: maxPrice ? parseFloat(maxPrice) : null,
        currency
      })
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { throw new Error('Chyba serveru'); }
    if (!res.ok) throw new Error(data.error);

    showAlert('alert-add', 'success', `✅ "${previewData.name}" přidáno ke sledování!`);
    resetForm();
    loadEvents();
  } catch(e) {
    showAlert('alert-add', 'error', e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✅ Přidat hlídání';
  }
}

function resetForm() {
  document.getElementById('url-input').value = '';
  document.getElementById('preview-box').style.display = 'none';
  document.getElementById('max-price').value = '';
  previewData = null;
}

async function loadEvents() {
  try {
    const res = await fetch('/api/events');
    const events = await res.json();
    renderEvents(events);
    document.getElementById('event-count-pill').textContent = events.length + ' sledovaných akcí';
  } catch(e) { console.error(e); }
}

function renderEvents(events) {
  const cont = document.getElementById('events-container');
  if (!events.length) {
    cont.innerHTML = `<div class="empty-state"><span class="big">🎪</span>Zatím žádné sledované akce.<br>Vlož URL z TicketSwap výše!</div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'events-grid';

  events.forEach(ev => {
    const card = document.createElement('div');
    card.className = 'event-card';
    const cur = ev.currency || 'EUR';
    card.innerHTML = `
      <div>
        <div class="event-name">${ev.name}</div>
        <div class="event-url">${ev.url}</div>
        <div class="event-meta">
          ${ev.max_price ? `<div class="meta-item limit">limit: <span>${ev.max_price.toFixed(2)} ${cur}</span></div>` : '<div class="meta-item">bez limitu — <span>vše</span></div>'}
          <div class="meta-item">nalezeno: <span>${ev.seen_count}</span></div>
          <div class="meta-item">notifikací: <span>${ev.notification_count}</span></div>
          <div class="meta-item">poslední check: <span>${formatDate(ev.last_checked)}</span></div>
        </div>
        <div class="notif-panel" id="notif-${ev.id}"></div>
      </div>
      <div class="event-actions">
        <button class="btn btn-secondary btn-sm" onclick="toggleNotifs(${ev.id})">📋</button>
        <a href="${ev.url}" target="_blank" class="btn btn-secondary btn-sm">🔗</a>
        <button class="btn btn-danger btn-sm" onclick="deleteEvent(${ev.id})">🗑</button>
      </div>
    `;
    grid.appendChild(card);
  });

  cont.innerHTML = '';
  cont.appendChild(grid);
}

async function toggleNotifs(id) {
  const panel = document.getElementById(`notif-${id}`);
  if (panel.style.display === 'block') { panel.style.display = 'none'; return; }

  panel.style.display = 'block';
  panel.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:.75rem;padding:8px 0">Načítám…</div>';

  const res = await fetch(`/api/events/${id}/notifications`);
  const notifs = await res.json();

  if (!notifs.length) {
    panel.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:.75rem;padding:8px 0">Zatím žádné notifikace.</div>';
    return;
  }

  panel.innerHTML = notifs.map(n => `
    <div class="notif-row">
      <span class="n-price">${n.price?.toFixed(2)} ${''}</span>
      <span>${n.num_tickets}x lístek</span>
      <a href="${n.listing_url}" target="_blank" class="n-link">koupit →</a>
      <span class="n-date">${formatDate(n.sent_at)}</span>
    </div>
  `).join('');
}

async function deleteEvent(id) {
  if (!confirm('Odebrat tuto akci ze sledování?')) return;
  await fetch(`/api/events/${id}`, {method:'DELETE'});
  loadEvents();
}

async function checkNow() {
  const btn = document.getElementById('check-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Kontroluji…';
  try {
    const res = await fetch('/api/check-now', {method:'POST'});
    const text = await res.text();
    showAlert('alert-main', 'success', '✅ Kontrola dokončena! Podívej se na Telegram.');
    setTimeout(loadEvents, 1000);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '↻ Zkontrolovat teď';
  }
}

async function testTelegram() {
  const res = await fetch('/api/test-telegram', {method:'POST'});
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { data = {message:'Chyba'}; }
  showAlert('alert-main', res.ok ? 'success' : 'error', data.message);
}

loadEvents();
</script>
</body>
</html>
